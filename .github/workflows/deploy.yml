name: Publicar frontend en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  compilar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: frontend
        run: npm install

      - name: Compilar el frontend
        working-directory: frontend
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir el sitio compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  publicar:
    needs: compilar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: despliegue
        uses: actions/deploy-pages@v4
